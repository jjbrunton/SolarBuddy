version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    ignore:
      # eslint 10 removes context.getFilename(), which the eslint-plugin-react
      # pinned by eslint-config-next still calls. Hold the major until Next.js
      # ships a compatible eslint-config-next. Minor/patch bumps still flow.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      npm-dev-dependencies:
        dependency-type: "development"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

