name: Validation

on:
  push:
    branches-ignore:
      - badge-data
  pull_request:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  test:
    name: Docs and tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check API docs inventory
        run: npm run docs:check

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Generate coverage badge and summary
        run: node ./scripts/update-coverage-artifacts.mjs

      - name: Publish coverage summary
        run: cat coverage/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: error

      - name: Publish coverage badge branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          badge_branch="badge-data"
          worktree_dir="$(mktemp -d)"

          cleanup() {
            git worktree remove "$worktree_dir" --force >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          if git ls-remote --exit-code --heads origin "$badge_branch" >/dev/null 2>&1; then
            git fetch origin "$badge_branch:$badge_branch"
            git worktree add "$worktree_dir" "$badge_branch"
          else
            git worktree add --detach "$worktree_dir"
            (
              cd "$worktree_dir"
              git switch --orphan "$badge_branch"
              git rm -rf . >/dev/null 2>&1 || true
              mkdir -p badges
              cp "$GITHUB_WORKSPACE/public/badges/coverage.svg" badges/coverage.svg
              cp "$GITHUB_WORKSPACE/coverage/coverage-summary.json" coverage-summary.json
              cp "$GITHUB_WORKSPACE/coverage/coverage-summary.md" coverage-summary.md
              git add badges/coverage.svg coverage-summary.json coverage-summary.md
              git commit -m "Initialize coverage badge branch"
              git push origin "$badge_branch"
            )
            exit 0
          fi

          mkdir -p "$worktree_dir/badges"
          cp public/badges/coverage.svg "$worktree_dir/badges/coverage.svg"
          cp coverage/coverage-summary.json "$worktree_dir/coverage-summary.json"
          cp coverage/coverage-summary.md "$worktree_dir/coverage-summary.md"

          (
            cd "$worktree_dir"
            git add badges/coverage.svg coverage-summary.json coverage-summary.md
            if git diff --cached --quiet; then
              echo "Coverage badge is already current."
              exit 0
            fi
            git commit -m "Update coverage badge"
            git push origin "$badge_branch"
          )

  build:
    name: Build, smoke test, and E2E
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        env:
          # Exposed via /api/health; lets smoke+E2E assert the running build
          # matches the commit being tested in CI.
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: npm run build

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npm run test:e2e:install

      - name: Install Playwright system deps
        # Browsers may be cached, but the OS-level shared libraries aren't — so
        # ensure they're always present even on a cache hit.
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Smoke test production server
        run: npm run test:smoke

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload smoke log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-log
          path: /tmp/solarbuddy-smoke.log
          if-no-files-found: ignore

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces
          path: test-results
          if-no-files-found: ignore
