name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review
    runs-on: ubuntu-latest

    steps:
      - name: Check dependency changes
        continue-on-error: true
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          fail-on-severity: high

      - name: Note unsupported repository modes
        if: ${{ failure() }}
        run: |
          echo "Dependency Review is unsupported for this repository configuration on GitHub."
          echo "The workflow is left in best-effort mode so unsupported repo settings do not block PRs."
